<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantify Dashboard</title>

  <link rel="stylesheet" href="academicstyle.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <a href="#">
        <img src="https://i.ibb.co/gLqt47Q0/1.png" alt="logo">
      </a>
      <h2>MANIT<span>ify</span></h2>
    </div>

    <div class="nav-right">
      <i class="fa-solid fa-sun toggle" onclick="toggleMode()"></i>
      <img src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png" class="avatar" alt="user">
    </div>
    
  </nav>
  <section class="container">
    <div class="header">
      <div>
        <h1>Study Resources</h1>
        <p>Select your group to access course materials</p>
    <!-- MAIN CONTAINER -->
      </div>

      <div class="group-select">
        <span>Select Group:</span>

        <!-- IMPORTANT: add id -->
        <select id="groupSelector">
          <option value="mt">MT Group</option>
          <option value="st">ST Group</option>
        </select>
      </div>
    </div>

    <!-- SUBJECT GRID -->
    <!-- IMPORTANT: keep this empty -->
    <div class="grid" id="subjectGrid"></div>
  </section>

  <script src="academicscript.js"></script>
</body>
</html>
